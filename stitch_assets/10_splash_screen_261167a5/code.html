<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>PakBridge AI - Splash</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Hanken+Grotesk:wght@600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0; }
            30% { opacity: 0.6; }
            100% { transform: scale(2.2); opacity: 0; }
        }
        @keyframes subtle-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        @keyframes grid-pan {
            0% { background-position: 0 0; }
            100% { background-position: 100px 100px; }
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        @keyframes fade-slide-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pakistan-grid {
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(0, 242, 255, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 242, 255, 0.08) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black 20%, transparent 90%);
            animation: grid-pan 20s linear infinite;
            will-change: transform, background-position;
        }

        .glass-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .shimmer-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.4), transparent);
            animation: shimmer 1.5s infinite linear;
        }

        .animate-reveal {
            animation: fade-slide-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @media (prefers-reduced-motion: reduce) {
            .pakistan-grid, .animate-pulse-ring, .animate-reveal, .shimmer-bar::after, .animate-\[subtle-float_4s_ease-in-out_infinite\] {
                animation: none !important;
                transition: none !important;
            }
            .animate-reveal {
                opacity: 1;
                transform: none;
            }
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#0035bd",
                        "on-tertiary-fixed-variant": "#930005",
                        "secondary-fixed": "#74f5ff",
                        "background": "#0a0e1a",
                        "on-tertiary-container": "#ffece9",
                        "tertiary-container": "#d71a18",
                        "tertiary": "#ffb4aa",
                        "on-primary-container": "#efefff",
                        "surface": "#0a0e1a",
                        "tertiary-fixed": "#ffdad5",
                        "primary-fixed": "#dde1ff",
                        "inverse-on-surface": "#2c303d",
                        "on-primary-fixed": "#001355",
                        "surface-container-high": "#262a37",
                        "outline-variant": "#434656",
                        "on-secondary-fixed": "#002022",
                        "surface-container": "#1b1f2c",
                        "on-error": "#690005",
                        "tertiary-fixed-dim": "#ffb4aa",
                        "on-secondary-fixed-variant": "#004f54",
                        "on-background": "#dfe2f3",
                        "primary-container": "#2d5bff",
                        "on-tertiary": "#690003",
                        "on-tertiary-fixed": "#410001",
                        "primary": "#b8c3ff",
                        "error": "#ffb4ab",
                        "outline": "#8e90a2",
                        "surface-container-highest": "#313442",
                        "on-secondary-container": "#006a70",
                        "surface-tint": "#b8c3ff",
                        "surface-container-low": "#171b28",
                        "surface-container-lowest": "#0a0e1a",
                        "error-container": "#93000a",
                        "secondary": "#00f2ff",
                        "on-primary": "#002387",
                        "surface-variant": "#313442",
                        "on-error-container": "#ffdad6",
                        "on-surface": "#dfe2f3",
                        "inverse-primary": "#104af0",
                        "on-secondary": "#00363a",
                        "surface-bright": "#353946",
                        "inverse-surface": "#dfe2f3",
                        "secondary-container": "#00f2ff",
                        "on-surface-variant": "#c4c5d9",
                        "primary-fixed-dim": "#b8c3ff",
                        "secondary-fixed-dim": "#00f2ff",
                        "surface-dim": "#0a0e1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "stack-md": "12px",
                        "stack-sm": "4px",
                        "container-margin": "24px",
                        "stack-lg": "24px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "title-md": ["Inter"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "body-md": ["Inter"],
                        "display-lg": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "title-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "display-lg": ["56px", {"lineHeight": "64px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "label-sm": ["11px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
            background-color: #0a0e1a;
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface flex flex-col min-h-screen overflow-hidden">
<!-- Parallax Background Grid Container -->
<div class="fixed inset-0 z-0 transition-transform duration-500 ease-out" id="grid-container">
<div class="absolute inset-0 pakistan-grid opacity-25"></div>
</div>
<!-- Atmospheric Lighting -->
<div class="fixed top-[-20%] left-[-10%] w-[60%] h-[60%] bg-primary-container/10 rounded-full blur-[160px] z-0"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary-container/15 rounded-full blur-[140px] z-0"></div>
<main class="relative z-10 flex flex-col items-center justify-center px-container-margin h-screen"><div class="flex flex-col items-center justify-center space-y-16">
    <!-- Center Logo & Complex Pulse -->
    <div class="relative flex items-center justify-center animate-[subtle-float_4s_ease-in-out_infinite]">
        <!-- Complex AI Pulse Layers -->
        <div class="absolute w-32 h-32 rounded-full border-2 border-secondary-container/30 blur-[2px] [animation:pulse-ring_3.5s_cubic-bezier(0.4,0,0.2,1)_infinite]"></div>
        <div class="absolute w-32 h-32 rounded-full border border-secondary-container/20 blur-[8px] [animation:pulse-ring_3.5s_cubic-bezier(0.4,0,0.2,1)_infinite_1s]"></div>
        <div class="absolute w-32 h-32 rounded-full border border-secondary-container/10 [animation:pulse-ring_3.5s_cubic-bezier(0.4,0,0.2,1)_infinite_2s]"></div>
        <!-- Logo Container -->
        <div class="w-24 h-24 flex items-center justify-center bg-surface-container-high/80 glass-blur rounded-2xl border border-white/10 shadow-[0_0_50px_rgba(0,242,255,0.2)] relative overflow-hidden group">
            <div class="absolute inset-0 bg-gradient-to-tr from-secondary-container/20 to-transparent opacity-60"></div>
            <span class="material-symbols-outlined text-secondary-container text-5xl relative z-10 drop-shadow-[0_0_12px_rgba(0,242,255,0.8)]" style="font-variation-settings: 'FILL' 1;">
                hub
            </span>
        </div>
    </div>
    <!-- Typography with Reveal Animation -->
    <div class="text-center space-y-stack-sm max-w-sm animate-reveal opacity-0" style="animation-delay: 0.2s;">
        <h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">
            PakBridge <span class="text-secondary-container drop-shadow-[0_0_8px_rgba(0,242,255,0.4)]">AI</span>
        </h1>
        <p class="font-body-md text-body-md text-on-surface-variant leading-relaxed opacity-80">
            Agentic Crisis Intelligence for Pakistan
        </p>
    </div>
    <!-- Loading Section Moved inside Center Unit -->
    <div class="flex flex-col items-center space-y-stack-md animate-reveal opacity-0" style="animation-delay: 0.6s;">
        <div class="w-56 h-[3px] bg-white/5 rounded-full overflow-hidden relative">
            <div class="absolute top-0 left-0 h-full bg-secondary-container shadow-[0_0_15px_rgba(0,242,255,1)] transition-all duration-300 ease-out shimmer-bar" id="progress-bar" style="width: 0%"></div>
        </div>
        <div class="flex items-center gap-base">
            <span class="w-2 h-2 rounded-full bg-secondary-container shadow-[0_0_8px_rgba(0,242,255,0.8)] animate-pulse"></span>
            <p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-[0.2em] opacity-80" id="status-text">
                Initializing Neural Bridge
            </p>
        </div>
    </div>
</div></main>
<!-- Bottom Loading Section -->

<!-- Decorative Corner Elements -->
<div class="fixed top-8 left-8 border-t border-l border-white/20 w-12 h-12 z-10"></div>
<div class="fixed top-8 right-8 border-t border-r border-white/20 w-12 h-12 z-10"></div>
<div class="fixed bottom-8 left-8 border-b border-l border-white/20 w-12 h-12 z-10"></div>
<div class="fixed bottom-8 right-8 border-b border-r border-white/20 w-12 h-12 z-10"></div>
<script>
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');
        const gridContainer = document.getElementById('grid-container');
        
        const statuses = [
            "Syncing Satellite Telemetry",
            "Analyzing Regional Volatility",
            "Establishing Command Protocol",
            "PakBridge AI Online"
        ];

        let progress = 0;
        let statusIndex = 0;

        // Progress Animation Logic
        const interval = setInterval(() => {
            progress += Math.random() * 5 + 2;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
            }
            progressBar.style.width = `${progress}%`;

            const targetStatusIndex = Math.min(
                Math.floor((progress / 100) * statuses.length),
                statuses.length - 1
            );
            
            if (targetStatusIndex !== statusIndex) {
                statusIndex = targetStatusIndex;
                statusText.style.transition = 'opacity 0.3s ease';
                statusText.style.opacity = '0';
                setTimeout(() => {
                    statusText.textContent = statuses[statusIndex];
                    statusText.style.opacity = '0.8';
                }, 300);
            }
        }, 200);

        // Subtle Parallax Effect
        const handleInteraction = (x, y) => {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
            
            const moveX = (x / window.innerWidth - 0.5) * 30;
            const moveY = (y / window.innerHeight - 0.5) * 30;
            gridContainer.style.transform = `translate(${moveX}px, ${moveY}px)`;
        };

        window.addEventListener('mousemove', (e) => handleInteraction(e.clientX, e.clientY));
        
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                // gamma: left-to-right, beta: front-to-back
                const x = (e.gamma + 45) / 90 * window.innerWidth;
                const y = (e.beta + 45) / 90 * window.innerHeight;
                handleInteraction(x, y);
            });
        }
    </script>


</body></html>
